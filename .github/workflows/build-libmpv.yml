name: Build libmpv

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths-ignore:
      - .github/workflows/build-libmpv-android.yml
      - .github/workflows/build-libmpv-darwin.yml
      - ci/build-ios.sh

jobs:
  windows:
    name: Windows x64
    runs-on: ubuntu-24.04
    env:
      TARGET: x86_64-w64-mingw32
      RUST_TARGET: x86_64-pc-windows-gnu
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      DOWNLOAD_CACHE: ${{ github.workspace }}/.ccache/downloads
    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: libmpv-windows-x64-${{ hashFiles('ci/build-mingw64.sh') }}
          restore-keys: libmpv-windows-x64-

      - uses: actions/cache@v6
        with:
          path: mingw_prefix
          key: libmpv-windows-prefix-${{ hashFiles('ci/build-mingw64.sh') }}

      - name: Install build tools
        run: |
          rustup target add "$RUST_TARGET"
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache g++-mingw-w64 nasm ninja-build pkgconf wine64
          python -m pip install meson

      - name: Download Meson dependencies
        run: |
          mkdir -p subprojects
          meson wrap install mujs
          meson subprojects download

      - name: Build libmpv
        run: bash ./ci/build-mingw64.sh libmpv

      - name: Collect artifact
        run: |
          mkdir -p artifact/include/mpv
          "$TARGET-strip" -s mingw_build/libmpv-2.dll
          cp mingw_build/libmpv-2.dll mingw_build/libmpv.dll.a artifact/
          cp include/mpv/*.h artifact/include/mpv/

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-windows-x64
          path: artifact

  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    container: registry.opensuse.org/home/mia/images/images/mpv-ci:stable-deps
    steps:
      - uses: actions/checkout@v7

      - name: Build libmpv
        run: |
          meson setup build \
            --buildtype=release \
            -Ddefault_library=shared -Dprefer_static=true \
            -Dlibmpv=true -Dcplayer=false -Dtests=false -Dgpl=false \
            -Dcplugins=disabled -Dlua=disabled -Djavascript=disabled \
            -Dlibarchive=disabled -Dlibbluray=disabled -Ddvdnav=disabled \
            -Dcdda=disabled -Ddvbin=disabled -Drubberband=disabled \
            -Dzimg=disabled -Dvapoursynth=disabled \
            -Dsdl2-gamepad=disabled -Dsdl2-video=disabled \
            -Diconv=disabled -Dlcms2=disabled -Duchardet=disabled \
            -Dlibavdevice=disabled -Dlibcurl=disabled \
            -Djack=disabled -Dopenal=disabled -Doss-audio=disabled \
            -Dsndio=disabled -Dx11=disabled -Dx11-clipboard=disabled \
            -Dwayland=disabled -Dvulkan=disabled \
            -Dpipewire=enabled -Dpulse=enabled -Dalsa=enabled
          meson compile -C build

          needed="$(readelf -d build/libmpv.so | sed -n 's/.*Shared library: \[\(.*\)\]/\1/p')"
          unexpected="$(printf '%s\n' "$needed" | grep -Ev '^lib(c|m|pthread|dl|rt|resolv|util|gcc_s|stdc\+\+|atomic)\.so(\..*)?$' || true)"
          if [ -n "$unexpected" ]; then
            printf 'Non-system shared dependencies remain:\n%s\n' "$unexpected" >&2
            exit 1
          fi

      - name: Collect artifact
        run: |
          mkdir -p artifact/lib artifact/include/mpv
          cp -a build/libmpv.so* artifact/lib/
          cp include/mpv/*.h artifact/include/mpv/

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-linux-x64
          path: artifact
