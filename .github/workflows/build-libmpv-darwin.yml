name: Build libmpv for Apple platforms

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths-ignore:
      - .github/workflows/build-libmpv.yml
      - .github/workflows/build-libmpv-android.yml
      - ci/build-mingw64.sh
      - ci/build-linux.sh

permissions:
  contents: read

jobs:
  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.min_macos }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            min_macos: '12.0'
          - arch: x86_64
            runner: macos-15-intel
            min_macos: '10.15'
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: brew install dylibbundler ffmpeg libass libplacebo meson ninja pkg-config

      - name: Build libmpv
        run: |
          meson setup build-macos \
            --buildtype=release \
            -Dc_args=-mmacosx-version-min=$MACOSX_DEPLOYMENT_TARGET \
            -Dc_link_args=-mmacosx-version-min=$MACOSX_DEPLOYMENT_TARGET \
            -Dobjc_args=-mmacosx-version-min=$MACOSX_DEPLOYMENT_TARGET \
            -Dobjc_link_args=-mmacosx-version-min=$MACOSX_DEPLOYMENT_TARGET \
            -Ddefault_library=shared -Dlibmpv=true \
            -Dcplayer=false -Dtests=false -Dgpl=false \
            -Dcplugins=disabled -Dlua=disabled -Djavascript=disabled \
            -Dlibarchive=disabled -Dlibbluray=disabled -Ddvdnav=disabled \
            -Dcdda=disabled -Ddvbin=disabled -Drubberband=disabled \
            -Dsdl2-gamepad=disabled -Dsdl2-video=disabled \
            -Dzimg=disabled -Dvapoursynth=disabled \
            -Dcoreaudio=enabled -Dgl-cocoa=enabled -Dcocoa=enabled
          meson compile -C build-macos mpv

      - name: Collect self-contained artifact
        run: |
          mkdir -p artifact/include/mpv artifact/lib
          dylibbundler -od -b -x build-macos/libmpv.dylib \
            -d artifact/lib -p @loader_path/lib
          strip -x build-macos/libmpv.dylib
          cp build-macos/libmpv.dylib artifact/
          cp include/mpv/*.h artifact/include/mpv/
          file artifact/libmpv.dylib
          file artifact/libmpv.dylib | grep -q "${{ matrix.arch }}"
          test "$(otool -l artifact/libmpv.dylib | awk '/minos/{print $2; exit}')" = "$MACOSX_DEPLOYMENT_TARGET"
          otool -L artifact/libmpv.dylib

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-macos-${{ matrix.arch }}
          path: artifact
          if-no-files-found: error

  macos-universal:
    name: macOS arm64_x86_64
    needs: macos
    runs-on: macos-15
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: libmpv-macos-arm64
          path: slices/arm64

      - uses: actions/download-artifact@v8
        with:
          name: libmpv-macos-x86_64
          path: slices/x86_64

      - name: Create universal artifact
        run: |
          mkdir -p artifact/lib
          cp -R slices/arm64/include artifact/
          lipo -create slices/arm64/libmpv.dylib slices/x86_64/libmpv.dylib \
            -output artifact/libmpv.dylib
          for arm in slices/arm64/lib/*.dylib; do
            name="$(basename "$arm")"
            test -f "slices/x86_64/lib/$name"
            lipo -create "$arm" "slices/x86_64/lib/$name" \
              -output "artifact/lib/$name"
          done
          for intel in slices/x86_64/lib/*.dylib; do
            test -f "slices/arm64/lib/$(basename "$intel")"
          done
          test "$(lipo -archs artifact/libmpv.dylib)" = "x86_64 arm64" \
            -o "$(lipo -archs artifact/libmpv.dylib)" = "arm64 x86_64"
          otool -L artifact/libmpv.dylib

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-macos-arm64_x86_64
          path: artifact
          if-no-files-found: error

  ios:
    name: iOS device + simulator
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: media-kit/libmpv-darwin-build
          ref: b4e3ce98826cd4a28f6121b29f56ea203346e6e3
          path: libmpv-darwin-build

      - name: Patch dependencies for iOS
        run: |
          sed -i.bak '/-Dfuzzer_ldflags=/a\
              sed -i.bak '\''/#define HAVE_SINCOSF 1/d'\'' build/config.h
          ' libmpv-darwin-build/nix/packages/mk-pkg-harfbuzz/default.nix
          sed -i.bak '/rsync -a libpng-patch/a\
                  sed -i '\''s/ || defined(TARGET_OS_MAC)//'\'' $src/pngpriv.h
          ' libmpv-darwin-build/nix/packages/mk-pkg-libpng/default.nix

      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            sandbox = true
            sandbox-fallback = false

      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: false

      - name: Build libmpv
        working-directory: libmpv-darwin-build
        run: |
          make \
            XCODE_PATH="$(realpath /Applications/Xcode.app)" \
            VERSION="${GITHUB_SHA::7}" \
            TARGET=mk-out-archive-xcframeworks-ios-universal-video-default

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-ios-arm64_x86_64-xcframeworks
          path: libmpv-darwin-build/result/libmpv-xcframeworks_*_ios-universal-video-default.tar.gz
          if-no-files-found: error
