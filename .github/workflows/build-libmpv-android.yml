name: Build libmpv for Android

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths-ignore:
      - .github/workflows/build-libmpv.yml
      - .github/workflows/build-libmpv-darwin.yml
      - ci/build-ios.sh
      - ci/build-mingw64.sh
      - ci/build-linux.sh

permissions:
  contents: read

env:
  NDK_VERSION: 28.2.13676358
  FFMPEG_VERSION: n6.1.2
  LIBPLACEBO_VERSION: '7.360.1'

jobs:
  android:
    name: Android (4 ABIs)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          path: mpv-source

      - uses: actions/checkout@v7
        with:
          repository: media-kit/libmpv-android-video-build
          path: android-build

      - uses: actions/cache@v6
        id: android-deps
        with:
          path: |
            android-build/buildscripts/deps
            android-build/buildscripts/prefix
          key: libmpv-android-deps-${{ env.NDK_VERSION }}-${{ env.FFMPEG_VERSION }}-${{ env.LIBPLACEBO_VERSION }}-${{ hashFiles('android-build/buildscripts/include/depinfo.sh', 'android-build/buildscripts/scripts/**') }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            autoconf automake cmake libtool meson nasm ninja-build pkgconf
          python3 -m pip install --upgrade meson

      - name: Prepare Android dependencies
        working-directory: android-build/buildscripts
        run: |
          mkdir -p sdk
          ln -s "$ANDROID_HOME" sdk/android-sdk-linux
          sed -i "s/^v_ndk=.*/v_ndk=$NDK_VERSION/" include/depinfo.sh
          TRAVIS=1 ./download.sh
          sed -i '/^#define MBEDTLS_AESCE_C$/d' deps/mbedtls/include/mbedtls/mbedtls_config.h
          cp flavors/default.sh scripts/ffmpeg.sh
          cat >scripts/libplacebo.sh <<'LIBPLACEBO'
          #!/bin/bash -e
          . ../../include/depinfo.sh
          . ../../include/path.sh
          build=_build$ndk_suffix
          if [ "$1" = clean ]; then
            rm -rf "$build"
            exit 0
          fi
          [ "$1" = build ] || exit 255
          meson setup "$build" --cross-file "$prefix_dir/crossfile.txt" \
            -Dvulkan=disabled -Dopengl=disabled -Dd3d11=disabled \
            -Dglslang=disabled -Dshaderc=disabled -Dlcms=disabled \
            -Ddovi=disabled -Dlibdovi=disabled -Ddemos=false -Dtests=false \
            -Dbench=false -Dfuzz=false -Dunwind=disabled -Dxxhash=disabled
          ninja -C "$build" -j"$cores"
          DESTDIR="$prefix_dir" ninja -C "$build" install
          LIBPLACEBO
          sed -i "/v_libass=/a v_libplacebo=$LIBPLACEBO_VERSION" include/depinfo.sh
          sed -i '/dep_libass=/a dep_libplacebo=()' include/depinfo.sh
          sed -i 's/dep_mpv=(ffmpeg libass/dep_mpv=(ffmpeg libass libplacebo/' include/depinfo.sh
          test -d deps/libplacebo || \
            git clone --depth 1 --branch "v$LIBPLACEBO_VERSION" --recursive \
              https://code.videolan.org/videolan/libplacebo.git deps/libplacebo
          git -C deps/ffmpeg fetch --depth 1 origin tag "$FFMPEG_VERSION"
          git -C deps/ffmpeg reset --hard "$FFMPEG_VERSION"
          for patch in patches/ffmpeg/*.patch; do
            git -C deps/ffmpeg apply --check "$PWD/$patch" 2>/dev/null && \
              git -C deps/ffmpeg apply "$PWD/$patch" || true
          done
          sed -i '/--prefer-static/d' scripts/mpv.sh
          sed -i '/-Dlibplacebo=disabled/d' scripts/mpv.sh
          rm -rf deps/mpv
          cp -a "$GITHUB_WORKSPACE/mpv-source" deps/mpv

      - name: Build libmpv
        working-directory: android-build/buildscripts
        run: |
          if [ "${{ steps.android-deps.outputs.cache-hit }}" = true ]; then
            ./build.sh --clean --no-deps mpv
          else
            ./build.sh --clean mpv
          fi

      - name: Strip and collect artifacts
        run: |
          mkdir -p artifact/include/mpv
          cp mpv-source/include/mpv/*.h artifact/include/mpv/
          . android-build/buildscripts/include/depinfo.sh
          strip="$ANDROID_HOME/ndk/$v_ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            src="android-build/libmpv/src/main/jniLibs/$abi/libmpv.so"
            test -f "$src"
            mkdir -p "artifact/lib/$abi"
            "$strip" --strip-all "$src" -o "artifact/lib/$abi/libmpv.so"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-android
          path: artifact
          if-no-files-found: error
